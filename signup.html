<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HONEY BADGER GAMERS Sign up</title>
    <link rel="stylesheet" href="css/auth.css">
   <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/XvjfSBhs/logo.jpg">
</head>
<body>
    <div class="container">
        <form id="createAccount" class="auth-form"><h2>Create Account</h2>
      
          <div id="First-Name" class="input-group">
            <input type="Text" id="First_Name" placeholder="First Name">
            <span class="error"></span> 
        </div>
       
        <div id="Last-Name" class="input-group">
            <input type="text" id="Last_Name" placeholder="Last Name">
            <span class="error"></span> 
        </div>

        <div id="input-email" class="input-group">
            <input type="email" id="email" placeholder="Enter Email" required autocomplete="email">
            <span class="error"></span> 
        </div>

        <div id="input-password" class="input-group">
      <input type="password" id="password" placeholder="Enter Password" required autocomplete="current-password">
      <span class="error"></span>
    </div>

        <button type="button" id="signupBtn">Create Account</button>
        <p id="successMsg"></p>
    <p id="Back_To_Login" style="color:blue; cursor:pointer;" > <a href="login.html" style="color:blue;">
   Back To Login </a> </p>
         
     </form>
    </div>
 <script type="module" src="js/auth.js"></script>
</body>
</html>
