<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HONEY BADGER GAMERS LOGIN</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/XvjfSBhs/logo.jpg">
   
</head>
<body>
    <div class="container">
        <form id="loginForm" class="auth-form">
            <a href="index.html" class="close-btn">&times;</a>
            <h2>Login</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Enter Email" required autocomplete="email">
            <span class="error"></span> 
        </div>

        <div class="input-group">
      <input type="password" id="password" placeholder="Enter Password" required autocomplete="current-password">
      <span class="error"></span>
    </div>

        <button type="submit" id="login">Login</button>
        
<p id="successMsg" style="color:blue;"></p>

<p>
  <a href="signup.html" style="color:blue;">
    New User ? Create New Account
  </a>
</p>

         
     </form>
    </div>
<script type="module" src="js/auth.js"></script>

</body>
</html>
